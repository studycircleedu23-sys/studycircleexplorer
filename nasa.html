<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NASA News | Study Circle Explorer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <nav class="nav container">
    <a href="index.html" class="nav-logo">
      <img src="studycircle-logo.png" class="site-logo">
      <span class="logo-text">Study Circle <span class="logo-accent">Explorer</span></span>
    </a>
  </nav>
</header>

<section class="hero">
  <div class="container hero-inner">
    <h1 class="hero-title">🚀 NASA News</h1>
    <p class="hero-subtitle">
      Latest NASA missions, discoveries, telescope findings and space exploration updates.
    </p>
  </div>
</section>

<section class="section">
  <div class="container">

    <div id="nasa-news">
      <div class="resource-card">
        <div class="resource-info">
          <h3 class="resource-title">Loading Latest NASA News...</h3>
          <p class="resource-desc">Please wait while we fetch the latest updates.</p>
        </div>
      </div>
    </div>

  </div>
</section>

<script>
fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.nasa.gov/rss/dyn/breaking_news.rss")
.then(response => response.json())
.then(data => {

    let html = "";

    data.items.slice(0,10).forEach(item => {

        html += `
        <div class="resource-card">
          <div class="resource-info">
            <h3 class="resource-title">${item.title}</h3>
            <p class="resource-desc">
              ${item.description.replace(/<[^>]*>/g,'').substring(0,180)}...
            </p>
            <a href="${item.link}" target="_blank" class="resource-link">
              Read Full Article →
            </a>
          </div>
        </div>
        <br>
        `;
    });

    document.getElementById("nasa-news").innerHTML = html;
})
.catch(error => {
    document.getElementById("nasa-news").innerHTML =
    "<p>Unable to load NASA news at this time.</p>";
});
</script>
</body>
</html>
